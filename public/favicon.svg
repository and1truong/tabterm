<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="TabTerm">
  <title>TabTerm</title>
  <!-- Window body -->
  <rect width="64" height="64" rx="12" fill="#1a1e2e"/>
  <!-- Title bar (rounded top via overlapping rects) -->
  <rect width="64" height="16" rx="12" fill="#242840"/>
  <rect y="8" width="64" height="8" fill="#242840"/>
  <!-- Active tab -->
  <rect x="5" y="18" width="24" height="10" rx="3" fill="#2d3250"/>
  <!-- Inactive tabs -->
  <rect x="32" y="20" width="16" height="8" rx="2" fill="#1e2235" opacity="0.7"/>
  <rect x="51" y="20" width="10" height="8" rx="2" fill="#1e2235" opacity="0.4"/>
  <!-- Prompt + cursor -->
  <text x="10" y="46" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14" font-weight="600" fill="#98c379">$</text>
  <text x="22" y="46" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14" font-weight="600" fill="#61afef">_</text>
  <!-- AI dot -->
  <circle cx="54" cy="54" r="4.5" fill="#7aa2f7"/>
</svg>
