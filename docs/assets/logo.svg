<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 220" role="img" aria-label="TabTerm">
  <title>TabTerm</title>
  <desc>TabTerm — browser terminal workspace</desc>

  <!-- Terminal window -->
  <rect x="46" y="10" width="228" height="154" rx="10" fill="#1a1e2e"/>
  <!-- Title bar -->
  <rect x="46" y="10" width="228" height="28" rx="10" fill="#242840"/>
  <rect x="46" y="24" width="228" height="14" fill="#242840"/>
  <!-- Traffic lights -->
  <circle cx="68" cy="24" r="5" fill="#e06c75"/>
  <circle cx="85" cy="24" r="5" fill="#e5c07b"/>
  <circle cx="102" cy="24" r="5" fill="#98c379"/>
  <!-- Tab strip -->
  <rect x="46" y="38" width="228" height="22" fill="#1e2235"/>
  <rect x="52" y="41" width="58" height="19" rx="4" fill="#2d3250"/>
  <rect x="114" y="44" width="48" height="16" rx="3" fill="#1a1e2e" opacity="0.6"/>
  <rect x="166" y="44" width="48" height="16" rx="3" fill="#1a1e2e" opacity="0.6"/>
  <rect x="218" y="44" width="14" height="16" rx="3" fill="#1a1e2e" opacity="0.4"/>
  <text x="74" y="53" font-family="ui-monospace, monospace" font-size="8" fill="#abb2bf" text-anchor="middle">server</text>
  <text x="135" y="55" font-family="ui-monospace, monospace" font-size="7" fill="#5c6370" text-anchor="middle">api</text>
  <text x="187" y="55" font-family="ui-monospace, monospace" font-size="7" fill="#5c6370" text-anchor="middle">git</text>
  <text x="225" y="55" font-family="ui-monospace, monospace" font-size="8" fill="#5c6370" text-anchor="middle">+</text>
  <!-- Terminal body -->
  <text x="60" y="76" font-family="ui-monospace, monospace" font-size="8" fill="#98c379">$ npm run dev</text>
  <text x="60" y="88" font-family="ui-monospace, monospace" font-size="8" fill="#5c6370">  → ready on http://localhost:3000</text>
  <text x="60" y="100" font-family="ui-monospace, monospace" font-size="8" fill="#abb2bf">$ git status</text>
  <text x="60" y="112" font-family="ui-monospace, monospace" font-size="8" fill="#5c6370">On branch main</text>
  <text x="60" y="126" font-family="ui-monospace, monospace" font-size="8" fill="#61afef">$ <tspan fill="#abb2bf">_</tspan></text>
  <!-- AI badge -->
  <rect x="210" y="149" width="52" height="12" rx="3" fill="#3b4261"/>
  <text x="236" y="158" font-family="ui-monospace, monospace" font-size="7" fill="#7aa2f7" text-anchor="middle">✦ AI</text>

  <!-- Wordmark -->
  <text x="160" y="194" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="28" font-weight="500" fill="#141413" text-anchor="middle">TabTerm</text>
  <text x="160" y="212" font-family="-apple-system, system-ui, 'Segoe UI', sans-serif" font-size="11" fill="#3d3d3a" text-anchor="middle">browser terminal workspace</text>
</svg>
